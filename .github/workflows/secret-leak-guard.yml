name: Secret Leak Guard

on:
  pull_request:
  push:

jobs:
  secret-leak-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare scripts
        run: chmod +x scripts/security/scan-secrets.sh

      - name: Scan tracked files
        run: scripts/security/scan-secrets.sh repo

      - name: Scan git history
        run: scripts/security/scan-secrets.sh history
