name: contract-matrix-guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure executable
        run: chmod +x scripts/review/check-contract-matrix.sh

      - name: Guard (pull_request)
        if: github.event_name == 'pull_request'
        run: scripts/review/check-contract-matrix.sh "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"

      - name: Guard (push)
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            scripts/review/check-contract-matrix.sh
          else
            scripts/review/check-contract-matrix.sh "${{ github.event.before }}...${{ github.sha }}"
          fi
